# compose.yaml — PRODUCTION deployment of the io.telepat.ideon-article Pilot node.
#
#   ideon-mcp          ideon mcp serve-http (real generation when IDEON_DRY_RUN=false)
#   provider-daemon    pilot-daemon (no_skillinject) + app-store supervisor, which
#                      spawns io.pilot.wallet and io.telepat.ideon-article from the
#                      signed bundles, and registers on the Pilot overlay so buyers
#                      can reach the request-article capability on dataexchange :1001.
#
# USAGE: cp .env.example .env  (fill it in)  →  docker compose up -d
# For the air-gapped mock + dry-run regression test, use compose.smoke.yaml instead.
#
# HARD SAFETY (enforced in production too):
#   - the pilot image is the no_skillinject build — the subsystem that rewrites the
#     operator's ~/.claude/CLAUDE.md on a timer is compiled OUT;
#   - HOME is the container-local /home/pilot — the host $HOME / ~/.claude is NEVER
#     mounted into any service.
# Unlike compose.smoke.yaml this network is NOT `internal: true`: production needs
# egress for real generation (OpenRouter/Replicate) and to reach the Pilot overlay.
#
# Prereq: build the images + libpilot.so + signed bundles first (host-safe, all
# compilation happens inside docker/*.Dockerfile):  scripts/build-all.sh
name: ideon-article

volumes:
  pilot-state:   # provider identity + app-store install root (.pilot/apps) — persistent
  ideon-data:    # Ideon output root (/data/ideon), SHARED ideon-mcp <-> provider so the
                 # supervised app can read back the markdownPath ideon_write returns.

services:

  ideon-mcp:
    image: pilot-protocol/ideon:dev
    environment:
      IDEON_MCP_API_KEY: ${IDEON_MCP_API_KEY:?set IDEON_MCP_API_KEY in .env}
      TELEPAT_DISABLE_KEYTAR: "true"
      IDEON_HOME: /data/ideon
      # Provider keys for real generation (used only when IDEON_DRY_RUN=false).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
    volumes:
      - ideon-data:/data/ideon
    restart: unless-stopped

  provider-daemon:
    image: pilot-protocol/pilot:dev
    entrypoint: ["/scripts/provider-entrypoint.sh"]
    environment:
      HOME: /home/pilot
      PILOT_SOCKET: /home/pilot/run/pilot.sock
      IDENTITY_PATH: /home/pilot/.pilot/identity.json
      HOSTNAME_PILOT: ${PILOT_HOSTNAME:-ideon-provider}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Pilot overlay endpoints — default to the real Pilot network so buyers can
      # reach the node. Override in .env to point at a self-hosted rendezvous.
      RENDEZVOUS_REGISTRY: ${PILOT_REGISTRY:-34.71.57.205:9000}
      RENDEZVOUS_BEACON: ${PILOT_BEACON:-34.71.57.205:9001}
      IDEON_MCP_ENDPOINT: http://ideon-mcp:3001/mcp
      IDEON_MCP_API_KEY: ${IDEON_MCP_API_KEY:?set IDEON_MCP_API_KEY in .env}
      # false = real generation (requires OPENROUTER_API_KEY on ideon-mcp). The
      # supervised app inherits this env verbatim (the supervisor never resets it).
      IDEON_DRY_RUN: ${IDEON_DRY_RUN:-false}
      WALLET_BUNDLE: /bundles/io.pilot.wallet
      APP_BUNDLE: /bundles/io.telepat.ideon-article
      # libpilot.so for the sdk-node FFI (built from source, no_skillinject).
      PILOT_LIB_PATH: /opt/libpilot.so
    volumes:
      - ./bundles:/bundles:ro
      - ./scripts:/scripts:ro
      - ./build/libpilot.so:/opt/libpilot.so:ro
      - pilot-state:/home/pilot/.pilot
      - ideon-data:/data/ideon
    depends_on:
      ideon-mcp: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -S /home/pilot/.pilot/apps/io.telepat.ideon-article/app.sock"]
      interval: 5s
      timeout: 3s
      retries: 50
      start_period: 15s
