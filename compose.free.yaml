# compose.free.yaml — self-contained local network for the io.telepat.ideon-free node.
#
#   rendezvous (registry :9000 / beacon :9001 / dashboard :3000)
#        ▲                    ▲
#   provider-daemon       caller-daemon
#     └─ io.telepat.ideon-free (supervised; OUR app — app-store IPC on --socket:
#        ideon-free.{generate,poll,help})
#          └─ HTTP → gateway (Caddy) ──/mcp──▶ ideon-mcp (ideon mcp serve-http, dry-run)
#                                    └─/files─▶ ideon-data (article body read-back)
#
# Portability: the app talks ONLY to the gateway (/mcp to generate, /files to read
# the article body back) — it does NOT share the Ideon output volume, so this
# mirrors a remote catalogue install exactly. There is NO wallet: the FREE node
# dropped the payment leg; a caller invokes ideon-free.generate then polls.
#
# `pilot-net` is `internal: true` (no egress): everything is local and Ideon runs
# dry-run by default, so the demo needs no outbound network. For REAL generation
# set IDEON_DRY_RUN=false, supply OPENROUTER_API_KEY, and remove `internal: true`
# so ideon-mcp can reach OpenRouter.
#
# The pilot image is the no_skillinject build; HOME is the container-local
# /home/pilot; only ./bundles-free and ./scripts are mounted (read-only). All
# writable state lives under /home/pilot.
#
# Prereq: scripts/build-free.sh (builds the free wrapper image + signs the bundle).
name: ideon-free

networks:
  pilot-net:
    driver: bridge
    internal: true

volumes:
  ideon-data:   # Ideon output root (/data/ideon). Written by ideon-mcp, served
                # read-only by the gateway at /srv/ideon so the app fetches the
                # article body over HTTP (/files). The daemon does NOT mount it.

x-pilot-env: &pilot-env
  HOME: /home/pilot
  PILOT_SOCKET: /home/pilot/run/pilot.sock
  IDENTITY_PATH: /home/pilot/identity.json
  RENDEZVOUS_REGISTRY: rendezvous:9000
  RENDEZVOUS_BEACON: rendezvous:9001

services:

  rendezvous:
    image: pilot-protocol/pilot:dev
    command: ["rendezvous", "-registry-addr", ":9000", "-beacon-addr", ":9001", "-http", ":3000", "-store", "/home/pilot/reg.json", "-log-level", "info"]
    environment: { HOME: /home/pilot }
    networks: [pilot-net]
    healthcheck:
      # node is the only HTTP client in the slim image (no wget/curl).
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/healthz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 3s
      timeout: 4s
      retries: 30
      start_period: 4s

  ideon-mcp:
    image: pilot-protocol/ideon:dev
    environment:
      IDEON_MCP_API_KEY: ${IDEON_MCP_API_KEY:-changeme}
      TELEPAT_DISABLE_KEYTAR: "true"
      IDEON_HOME: /data/ideon
      # Model is swappable via env: IDEON_MODEL overlays Ideon's saved-config
      # `model` (resolver.ts resolveRunInput; read fresh per generation via
      # readEnvSettings -> model: env.IDEON_MODEL). Default = package default.
      IDEON_MODEL: ${IDEON_MODEL:-deepseek/deepseek-v4-pro}
      # Provider key for real generation (used only when IDEON_DRY_RUN=false).
      # NB: @telepat/ideon reads TELEPAT_OPENROUTER_KEY (NOT OPENROUTER_API_KEY).
      TELEPAT_OPENROUTER_KEY: ${OPENROUTER_API_KEY:-}
      TELEPAT_REPLICATE_TOKEN: ${REPLICATE_API_TOKEN:-}
    volumes:
      # ideon_write writes article-1.md + meta.json under $IDEON_HOME/.ideon/output/<stamp-slug>/.
      # The gateway serves this volume read-only at /srv/ideon (the app reads it back over HTTP).
      - ideon-data:/data/ideon
    networks: [pilot-net]

  # gateway — the same Caddy front door as the public edge, HTTP-only on the
  # internal net: /mcp → ideon-mcp, /files → the article volume (Bearer-gated).
  # The supervised app dials ONLY this gateway, so the smoke exercises the exact
  # portable path a remote install uses (no shared volume into the daemon).
  gateway:
    image: caddy:2-alpine
    environment:
      IDEON_MCP_API_KEY: ${IDEON_MCP_API_KEY:-changeme}
    volumes:
      - ./docker/gateway.Caddyfile:/etc/caddy/Caddyfile:ro
      - ideon-data:/srv/ideon:ro
    networks: [pilot-net]
    depends_on:
      ideon-mcp: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 3s
      timeout: 4s
      retries: 30
      start_period: 3s

  provider-daemon:
    image: pilot-protocol/pilot:dev
    entrypoint: ["/scripts/provider-entrypoint.free.sh"]
    environment:
      <<: *pilot-env
      HOSTNAME_PILOT: provider
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # The app dials the gateway only (/mcp + /files) — never ideon-mcp directly,
      # never a shared volume. Mirrors a remote install.
      IDEON_MCP_ENDPOINT: http://gateway/mcp
      IDEON_MCP_API_KEY: ${IDEON_MCP_API_KEY:-changeme}
      # true (default) = dry-run placeholder article, no LLM key needed. Set false
      # for real generation (also set OPENROUTER_API_KEY on ideon-mcp). The
      # supervised app inherits this env verbatim (the supervisor never resets it).
      IDEON_DRY_RUN: ${IDEON_DRY_RUN:-true}
      APP_BUNDLE: /bundles/io.telepat.ideon-free
      # libpilot.so for the sdk-node FFI (built from source). Inherited by the
      # supervised app, which the FFI loader honors first (org/sdk-node/src/ffi.ts:58-62).
      PILOT_LIB_PATH: /opt/libpilot.so
    volumes:
      - ./bundles-free:/bundles:ro
      - ./scripts:/scripts:ro
      - ./build/libpilot.so:/opt/libpilot.so:ro
      # No ideon-data mount: the app reads the article back over HTTP via the
      # gateway (/files), so the daemon needs no shared filesystem with Ideon.
    networks: [pilot-net]
    depends_on:
      rendezvous: { condition: service_healthy }
      gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "test -S /home/pilot/.pilot/apps/io.telepat.ideon-free/app.sock"]
      interval: 3s
      timeout: 3s
      retries: 50
      start_period: 12s
